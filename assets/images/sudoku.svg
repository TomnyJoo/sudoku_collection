<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- 定义 -->
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    
    <!-- 网格渐变 - 正面 -->
    <linearGradient id="gridFrontGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#E2E8F0;stop-opacity:0.85" />
    </linearGradient>
    
    <!-- 网格渐变 - 侧面 -->
    <linearGradient id="gridSideGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#94A3B8;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#64748B;stop-opacity:0.9" />
    </linearGradient>
    
    <!-- 金色数字渐变 -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDE68A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    
    <!-- 阴影滤镜 -->
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="16" dy="16" stdDeviation="24" flood-color="#000" flood-opacity="0.4" />
    </filter>
    
    <!-- 数字阴影滤镜 -->
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3" />
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="512" height="512" rx="48" ry="48" fill="url(#bgGradient)" />
  
  <!-- 主阴影 -->
  <rect x="40" y="40" width="432" height="432" rx="32" ry="32" fill="#000" opacity="0.15" />
  
  <!-- 3D 数独网格 - 侧面 -->
  <g transform="translate(80, 120) rotate(-10, 176, 176)">
    <!-- 左侧面 -->
    <path d="M 0 0 L 0 352 L -32 368 L -32 16 Z" fill="url(#gridSideGradient)" />
    <!-- 底面 -->
    <path d="M 0 352 L 352 352 L 320 368 L -32 368 Z" fill="url(#gridSideGradient)" />
  </g>
  
  <!-- 3D 数独网格 - 正面 -->
  <g transform="translate(80, 80) rotate(-10, 176, 176)" filter="url(#softShadow)">
    <!-- 网格背景 -->
    <rect width="352" height="352" rx="12" ry="12" fill="url(#gridFrontGradient)" />
    
    <!-- 粗线条分隔（3x3区块） - 立体感 -->
    <line x1="0" y1="117.33" x2="352" y2="117.33" stroke="#1E3A8A" stroke-width="6" stroke-linecap="round" />
    <line x1="0" y1="234.67" x2="352" y2="234.67" stroke="#1E3A8A" stroke-width="6" stroke-linecap="round" />
    <line x1="117.33" y1="0" x2="117.33" y2="352" stroke="#1E3A8A" stroke-width="6" stroke-linecap="round" />
    <line x1="234.67" y1="0" x2="234.67" y2="352" stroke="#1E3A8A" stroke-width="6" stroke-linecap="round" />
    
    <!-- 细线条分隔（单元格） -->
    <line x1="0" y1="39.11" x2="352" y2="39.11" stroke="#94A3B8" stroke-width="2" />
    <line x1="0" y1="78.22" x2="352" y2="78.22" stroke="#94A3B8" stroke-width="2" />
    <line x1="0" y1="156.44" x2="352" y2="156.44" stroke="#94A3B8" stroke-width="2" />
    <line x1="0" y1="195.56" x2="352" y2="195.56" stroke="#94A3B8" stroke-width="2" />
    <line x1="0" y1="273.78" x2="352" y2="273.78" stroke="#94A3B8" stroke-width="2" />
    <line x1="0" y1="312.89" x2="352" y2="312.89" stroke="#94A3B8" stroke-width="2" />
    
    <line x1="39.11" y1="0" x2="39.11" y2="352" stroke="#94A3B8" stroke-width="2" />
    <line x1="78.22" y1="0" x2="78.22" y2="352" stroke="#94A3B8" stroke-width="2" />
    <line x1="156.44" y1="0" x2="156.44" y2="352" stroke="#94A3B8" stroke-width="2" />
    <line x1="195.56" y1="0" x2="195.56" y2="352" stroke="#94A3B8" stroke-width="2" />
    <line x1="273.78" y1="0" x2="273.78" y2="352" stroke="#94A3B8" stroke-width="2" />
    <line x1="312.89" y1="0" x2="312.89" y2="352" stroke="#94A3B8" stroke-width="2" />
    
    <!-- 示例数字 - 左上角区块 -->
    <text x="58.67" y="58.67" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1E3A8A" text-anchor="middle" dominant-baseline="middle" filter="url(#textShadow)">1</text>
    <text x="97.78" y="19.56" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1E3A8A" text-anchor="middle" dominant-baseline="middle" filter="url(#textShadow)">2</text>
    <text x="19.56" y="97.78" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1E3A8A" text-anchor="middle" dominant-baseline="middle" filter="url(#textShadow)">3</text>
    
    <!-- 示例数字 - 右上角区块 -->
    <text x="282.67" y="58.67" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1E3A8A" text-anchor="middle" dominant-baseline="middle" filter="url(#textShadow)">4</text>
    <text x="321.78" y="19.56" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1E3A8A" text-anchor="middle" dominant-baseline="middle" filter="url(#textShadow)">5</text>
    <text x="243.56" y="97.78" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1E3A8A" text-anchor="middle" dominant-baseline="middle" filter="url(#textShadow)">6</text>
    
    <!-- 示例数字 - 左下角区块 -->
    <text x="58.67" y="293.33" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1E3A8A" text-anchor="middle" dominant-baseline="middle" filter="url(#textShadow)">7</text>
    <text x="97.78" y="332.44" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1E3A8A" text-anchor="middle" dominant-baseline="middle" filter="url(#textShadow)">8</text>
    <text x="19.56" y="254.22" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1E3A8A" text-anchor="middle" dominant-baseline="middle" filter="url(#textShadow)">9</text>
    
    <!-- 高亮中心数字 - 更强的立体感 -->
    <g transform="translate(176, 176)">
      <!-- 中心数字底座 -->
      <circle r="40" fill="#0F172A" opacity="0.3" transform="translate(4, 4)" />
      <!-- 中心数字背景 -->
      <circle r="36" fill="url(#goldGradient)" />
      <!-- 中心数字 -->
      <text x="0" y="8" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle" filter="url(#textShadow)">5</text>
      <!-- 高光效果 -->
      <circle cx="-12" cy="-12" r="12" fill="white" opacity="0.3" />
    </g>
  </g>
</svg>